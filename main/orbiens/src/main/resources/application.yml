spring:
  profiles:
    active: h2
server:
  servlet:
    context-path: /
jwt:
  secret:
  expiration: 3600
security:
  permit-all:
    paths:
      - /
      - /static/**
      - /api/auth/login
      - /api/captcha
cache:
  caffeine:
    initial-capacity: 10000
    maximum-size: 150000
    expire-after-access: 30m


orbien:
  dev: true
  acme:
    # staging=测试环境，production=生产环境
    environment: staging
    dns-poll-interval-seconds: 15
    dns-poll-max-attempts: 40
  scheduled-job:
    seed-on-startup: true
    log-retention-days: 30
    metrics-cleanup:
      cron: "0 0 1 * * ?"
      enabled: true
    agent-cleanup:
      cron: "0 30 2 * * ?"
      enabled: false
    acme-renew:
      cron: "0 0 3 * * ?"
      enabled: false
