spring:
  profiles:
    active: h2
server:
  servlet:
    context-path: /
  # 生产置于反向代理后时，据此还原对外 scheme/host，供 OAuth redirect_uri 等推导
  forward-headers-strategy: framework
jwt:
  secret:
  expiration: 3600
security:
  permit-all:
    paths:
      - /
      - /static/**
      - /api/auth/login
      - /api/captcha
      - /api/auth/oauth/**
cache:
  caffeine:
    initial-capacity: 10000
    maximum-size: 150000
    expire-after-access: 30m


orbien:
  console:
    # 开发模式
    dev: true
    # 演示模式
    preview-mode: false
  acme:
    # staging=测试证书，production=正式证书
    environment: production
    dns-poll-interval-seconds: 15
    dns-poll-max-attempts: 40
  scheduled-job:
    seed-on-startup: true
    log-retention-days: 30
    metrics-cleanup:
      cron: "0 0 1 * * ?"
      enabled: true
    agent-cleanup:
      cron: "0 30 2 * * ?"
      enabled: false
    acme-renew:
      cron: "0 0 3 * * ?"
      enabled: false
