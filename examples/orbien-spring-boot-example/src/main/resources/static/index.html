<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Orbien Example</title>
    <style>
        :root {
            --bg: #f6f7f9;
            --card: #fff;
            --text: #1f2937;
            --muted: #6b7280;
            --line: #e5e7eb;
            --accent: #2563eb;
            --accent-hover: #1d4ed8;
            --ok: #166534;
            --ok-bg: #dcfce7;
            --err: #991b1b;
            --err-bg: #fee2e2;
        }
        * { box-sizing: border-box; }
        body {
            margin: 0;
            font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.5;
        }
        .wrap {
            max-width: 720px;
            margin: 0 auto;
            padding: 32px 20px 48px;
        }
        h1 {
            margin: 0 0 24px;
            font-size: 22px;
            font-weight: 700;
        }
        .card {
            background: var(--card);
            border: 1px solid var(--line);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 16px;
        }
        .card h2 {
            margin: 0 0 14px;
            font-size: 15px;
            font-weight: 650;
        }
        label {
            display: block;
            font-size: 12px;
            font-weight: 600;
            color: var(--muted);
            margin-bottom: 6px;
        }
        input[type="text"],
        input[type="file"] {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid var(--line);
            border-radius: 8px;
            font: inherit;
            margin-bottom: 12px;
            background: #fff;
        }
        .row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }
        @media (max-width: 560px) {
            .row { grid-template-columns: 1fr; }
        }
        .actions {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }
        button {
            appearance: none;
            border: none;
            border-radius: 8px;
            padding: 10px 14px;
            font: inherit;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            background: var(--accent);
            color: #fff;
        }
        button:hover { background: var(--accent-hover); }
        button.secondary {
            background: #fff;
            color: var(--text);
            border: 1px solid var(--line);
        }
        button.secondary:hover { background: #f3f4f6; }
        .result {
            margin-top: 12px;
            padding: 12px;
            border-radius: 8px;
            font-size: 12px;
            white-space: pre-wrap;
            word-break: break-word;
            display: none;
            font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
        }
        .result.show { display: block; }
        .result.ok { background: var(--ok-bg); color: var(--ok); }
        .result.err { background: var(--err-bg); color: var(--err); }
    </style>
</head>
<body>
<div class="wrap">
    <h1>Orbien Example</h1>

    <section class="card">
        <h2>POST /api/echo</h2>
        <form id="jsonForm">
            <div class="row">
                <div>
                    <label for="jsonName">name</label>
                    <input id="jsonName" type="text" value="orbien" autocomplete="off">
                </div>
                <div>
                    <label for="jsonMsg">message</label>
                    <input id="jsonMsg" type="text" value="hello" autocomplete="off">
                </div>
            </div>
            <div class="actions">
                <button type="submit">Send JSON</button>
            </div>
        </form>
        <div id="jsonResult" class="result"></div>
    </section>

    <section class="card">
        <h2>POST /api/form</h2>
        <form id="formForm">
            <div class="row">
                <div>
                    <label for="formName">name</label>
                    <input id="formName" name="name" type="text" value="demo" autocomplete="off">
                </div>
                <div>
                    <label for="formMsg">message</label>
                    <input id="formMsg" name="message" type="text" value="form" autocomplete="off">
                </div>
            </div>
            <div class="actions">
                <button type="submit">Send Form</button>
            </div>
        </form>
        <div id="formResult" class="result"></div>
    </section>

    <section class="card">
        <h2>GET</h2>
        <div class="actions">
            <button type="button" class="secondary" id="btnHello">/api/hello</button>
            <button type="button" class="secondary" id="btnHeaders">/api/headers</button>
        </div>
        <div id="quickResult" class="result"></div>
    </section>

    <section class="card">
        <h2>POST /api/upload</h2>
        <form id="uploadForm">
            <input type="file" id="fileInput" name="file" accept="*/*">
            <div class="actions">
                <button type="submit">Upload</button>
            </div>
        </form>
        <div id="uploadResult" class="result"></div>
    </section>
</div>

<script>
    function show(el, ok, data) {
        el.className = 'result show ' + (ok ? 'ok' : 'err');
        el.textContent = typeof data === 'string' ? data : JSON.stringify(data, null, 2);
    }

    async function call(url, options) {
        const res = await fetch(url, options);
        const text = await res.text();
        let data;
        try { data = JSON.parse(text); } catch { data = text; }
        return { ok: res.ok, data };
    }

    document.getElementById('jsonForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const el = document.getElementById('jsonResult');
        try {
            const payload = {
                name: document.getElementById('jsonName').value,
                message: document.getElementById('jsonMsg').value
            };
            const { ok, data } = await call('/api/echo', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });
            show(el, ok, data);
        } catch (err) {
            show(el, false, err.message);
        }
    });

    document.getElementById('formForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const el = document.getElementById('formResult');
        try {
            const body = new URLSearchParams({
                name: document.getElementById('formName').value,
                message: document.getElementById('formMsg').value
            });
            const { ok, data } = await call('/api/form', {
                method: 'POST',
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                body
            });
            show(el, ok, data);
        } catch (err) {
            show(el, false, err.message);
        }
    });

    document.getElementById('btnHello').addEventListener('click', async () => {
        const el = document.getElementById('quickResult');
        try {
            const { ok, data } = await call('/api/hello');
            show(el, ok, data);
        } catch (err) {
            show(el, false, err.message);
        }
    });

    document.getElementById('btnHeaders').addEventListener('click', async () => {
        const el = document.getElementById('quickResult');
        try {
            const { ok, data } = await call('/api/headers');
            show(el, ok, data);
        } catch (err) {
            show(el, false, err.message);
        }
    });

    document.getElementById('uploadForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const el = document.getElementById('uploadResult');
        const file = document.getElementById('fileInput').files[0];
        if (!file) {
            show(el, false, 'No file selected');
            return;
        }
        const formData = new FormData();
        formData.append('file', file);
        try {
            const { ok, data } = await call('/api/upload', { method: 'POST', body: formData });
            show(el, ok, data);
        } catch (err) {
            show(el, false, err.message);
        }
    });
</script>
</body>
</html>
