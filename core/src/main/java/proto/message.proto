syntax = "proto3";
package io.github.lxien.orbien.core.message;

enum ProtocolType {
  TCP = 0;
  HTTP = 1;
  HTTPS = 2;
  UDP = 3;
  SOCKS5 = 4;
  FILE = 5;
}

enum AgentType {
  BINARY = 0;
  SESSION = 1;
}

enum AccessMode {
  ALLOW = 0;
  DENY = 1;
}

enum LoadBalanceStrategy {
  ROUND_ROBIN = 0;
  WEIGHT = 1;
  RANDOM = 2;
  LEAST_CONN = 3;
}
enum HealthStatus {
  UNKNOWN = 0;
  UP = 1;
  DOWN = 2;
}
enum ProxySyncType {
  FULL = 0;
  ADD = 1;
  UPDATE = 2;
  DELETE = 3;
}
enum HealthCheckType {
  HEALTH_CHECK_TYPE_TCP = 0;
  HEALTH_CHECK_TYPE_HTTP = 1;
}
message Status {
  int32 code = 1;
  optional string message = 2;
}
message AuthInfo {
  string token = 1;
  optional string name = 3;
  AgentType agent_type = 4;
  string version = 5;
  optional string os = 6;
  optional string arch = 7;
  optional string agent_id = 9;
}

message CreateConnectionRequest {
  string tunnel_id = 1;
}

message CreateConnectionResponse {
  string tunnel_id = 1;
  Status status = 2;
}

message OpenStreamResponse {
  uint32 connection_id = 1;
  string tunnel_id = 2;
  Status status = 3;
}

message AuthResponse {
  string agent_id = 1;
  uint32 connection_id = 2;
  Status status = 3;
}

message AccessControl {
  bool enabled = 1;
  AccessMode mode = 2;
  repeated string allow = 3;
  repeated string deny = 4;
}

message HttpUser {
  string username = 1;
  string password = 2;
}

message BasicAuth {
  bool enabled = 1;
  repeated HttpUser http_users = 2;
}

message Socks5User {
  string username = 1;
  string password = 2;
}

message Socks5Auth {
  bool enabled = 1;
  repeated Socks5User users = 2;
}

message FileShareUser {
  string username = 1;
  string password = 2;
  string permission = 3;
}

message FileShareAuth {
  bool enabled = 1;
  repeated FileShareUser users = 2;
}

message FileShareLimits {
  string root_path = 1;
  int64 max_upload_size = 2;
  bool allow_upload = 3;
  bool allow_delete = 4;
  bool allow_mkdir = 5;
}

message FileListRequest {
  string request_id = 1;
  string proxy_id = 2;
  string path = 3;
}

message FileEntry {
  string name = 1;
  bool directory = 2;
  int64 size = 3;
  int64 modified_time = 4;
}

message FileListResponse {
  string request_id = 1;
  string current_path = 2;
  string parent_path = 3;
  repeated FileEntry entries = 4;
  Status status = 5;
}

message FileTransferInit {
  string request_id = 1;
  string proxy_id = 2;
  string path = 3;
  int64 total_size = 4;
  bool upload = 5;
}

message FileChunk {
  string request_id = 1;
  int64 offset = 2;
  bytes data = 3;
  bool last = 4;
}

message FileTransferDone {
  string request_id = 1;
  Status status = 2;
}

message FileOpRequest {
  string request_id = 1;
  string proxy_id = 2;
  string op = 3;
  string path = 4;
  string name = 5;
}

message FileOpResponse {
  string request_id = 1;
  Status status = 2;
}

message Bandwidth {
  optional string limit = 1;
  optional string limit_in = 2;
  optional string limit_out = 3;
}

message Target {
  string host = 1;
  uint32 port = 2;
  optional string name = 3;
  optional int32 weight = 4;
}
message Domain {
  optional bool auto_domain = 1;
  repeated string custom_domains = 2;
  repeated string sub_domains = 3;
}

message TlsCert {
  string private_key_pem = 1;
  string cert_chain_pem = 2;
}

message Transport {
  optional bool multiplex = 1;
  optional bool encrypt = 2;
  optional bool compress = 3;
  optional string protocol = 4;
  optional string compress_algorithm = 5;
}
message HealthCheck{
  HealthCheckType type = 1;
  int32 interval = 2;
  int32 timeout = 3;
  int32 max_failed = 4;
  string path = 5;
  bool enabled = 6;
}

message Proxy {
  string proxyId = 1;
  string name = 2;
  ProtocolType protocol = 3;
  bool enabled = 4;
  repeated Target targets = 5;
  bool force_https = 6;
  optional uint32 remote_port = 7;
  optional Domain domain = 8;
  optional AccessControl access_control = 9;
  optional BasicAuth basic_auth = 10;
  optional Bandwidth bandwidth = 11;
  optional LoadBalanceStrategy load_balance_strategy = 12;
  optional Transport transport = 13;
  optional TlsCert tls_cert = 14;
  optional HealthCheck health_check = 15;
  optional Socks5Auth socks5_auth = 16;
  optional FileShareAuth file_auth = 17;
  optional FileShareLimits file_limits = 18;
}

message RuntimeInfo {
  string proxyId = 1;
  string name = 2;
  repeated Target targets = 3;
  repeated string remote_addr = 4;
  optional HealthCheck health_check = 5;
  optional Transport transport = 6;
  optional FileShareLimits file_limits = 7;
}
message BatchCreateProxiesRequest {
  repeated Proxy proxies = 1;
}
message BatchCreateProxiesResponse {
  repeated RuntimeInfo items = 1;
  Status status = 2;
}

message ProxySyncResponse {
  ProxySyncType proxy_sync_type = 1;
  repeated RuntimeInfo items = 2;
  repeated string proxy_ids = 3;
}
message ServiceHealth {
  string proxy_id = 1;
  string host = 2;
  uint32 port = 3;
  HealthStatus status = 4;
  uint64 responseTimeMs = 5;
}

message BatchReportServiceHealthRequest {
  repeated ServiceHealth items = 1;
}
message Error{
  Status status = 1;
}