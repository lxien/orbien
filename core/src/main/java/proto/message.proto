syntax = "proto3";
package com.xiaoniucode.etp.core.message;

enum ProtocolType {
  TCP = 0;
  HTTP = 1;
  HTTPS = 2;
}

enum AgentType {
  BINARY = 0;
  SESSION = 1;
}

enum AccessMode {
  ALLOW = 0;
  DENY = 1;
}

enum LoadBalanceStrategy {
  ROUND_ROBIN = 0;
  WEIGHT = 1;
  RANDOM = 2;
  LEAST_CONN = 3;
}
enum HealthStatus {
  UNKNOWN = 0;
  UP = 1;
  DOWN = 2;
}
enum ProxySyncType {
  FULL = 0;
  ADD = 1;
  UPDATE = 2;
  DELETE = 3;
}
message Status {
  int32 code = 1;
  string message = 2;
}
message AuthInfo {
  string token = 1;
  optional string name = 3;
  AgentType agent_type = 4;
  string version = 5;
  optional string os = 6;
  optional string arch = 7;
  optional string agent_id = 9;
}

message CreateConnectionRequest {
  string tunnel_id = 1;
}

message CreateConnectionResponse {
  string tunnel_id = 1;
  Status status = 2;
}

message OpenStreamResponse {
  uint32 connection_id = 1;
  string tunnel_id = 2;
  Status status = 3;
}
message ServerInfo{
  uint32 http_proxy_port = 1;
  uint32 https_proxy_port = 2;
  repeated string base_domains = 3;
}
message AuthResponse {
  string agent_id = 1;
  uint32 connection_id = 2;
  ServerInfo server_info = 3;
  Status status = 4;
}

message AccessControl {
  bool enabled = 1;
  AccessMode mode = 2;
  repeated string allow = 3;
  repeated string deny = 4;
}

message HttpUser {
  string username = 1;
  string password = 2;
}

message BasicAuth {
  bool enabled = 1;
  repeated HttpUser http_users = 2;
}

message Bandwidth {
  optional string limit = 1;
  optional string limit_in = 2;
  optional string limit_out = 3;
}

message Target {
  optional string host = 1;
  uint32 port = 2;
  optional string name = 3;
  optional int32 weight = 4;
}

message LoadBalance {
  optional LoadBalanceStrategy strategy = 1;
}

message DomainConfig {
  optional bool auto_domain = 1;
  repeated string custom_domains = 2;
  repeated string sub_domains = 3;
}

message SslCert {
  string private_key_pem = 1;
  string cert_chain_pem = 2;
}

message Transport {
  optional bool multiplex = 1;
  optional bool encrypt = 2;
  optional bool compress = 3;
}

message Proxy {
  string proxyId = 18;
  string name = 1;
  repeated Target targets = 2;
  optional bool enabled = 3;
  ProtocolType protocol = 6;
  optional uint32 remote_port = 7;
  optional DomainConfig domain = 8;
  optional AccessControl access_control = 11;
  optional BasicAuth basic_auth = 12;
  optional Bandwidth bandwidth = 13;
  optional LoadBalance load_balance = 14;
  optional Transport transport = 15;
  optional bool force_https = 16;
  optional SslCert ssl_cert = 17;
}

message DomainResult {
  string baseDomain = 1;
  string domain = 2;
}

message ProxyRuntime {
  Proxy proxy = 1;
  optional DomainResult domain = 2;
  optional uint32 listen_port = 3;
}
message BatchCreateProxiesRequest {
  repeated Proxy proxies = 1;
}
message BatchCreateProxiesResponse {
  repeated ProxyRuntime items = 1;
  Status status = 2;
}

message ProxySyncResponse {
  ProxySyncType proxy_sync_type = 1;
  repeated ProxyRuntime items = 2;
  repeated string proxy_ids = 3;
}
message ServiceHealth {
  string proxy_id = 1;
  string host = 2;
  uint32 port = 3;
  HealthStatus status = 4;
  uint64 responseTimeMs = 5;
}

message BatchReportServiceHealthRequest {
  repeated ServiceHealth items = 1;
}
message Error{
  Status status = 1;
}