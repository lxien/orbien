services:
  orbien-server:
    image: lxien/orbien-server:0.20.0
    container_name: orbien-server
    restart: unless-stopped
    ports:
      - "8080:8080"
      - "8443:8443"
      - "8020:8020"
      - "9527:9527"
      - "9050-9099:9050-9099"
      - "9050-9099:9050-9099/udp"
    environment:
      SPRING_PROFILES_ACTIVE: h2
      H2_DATA_DIR: /app/data/orbien-server
      JAVA_OPTS: "-Xms256m -Xmx256m -XX:MaxDirectMemorySize=512m -XX:+UseG1GC --enable-native-access=ALL-UNNAMED"
      TZ: Asia/Shanghai
    volumes:
      - ${ORBIEN_HOME:-./data/orbien}/data:/app/data
      - ${ORBIEN_HOME:-./data/orbien}/logs:/app/logs
