version: "3.8"

services:
  etps-mysql:
    image: mysql:8.4
    container_name: etps-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: etps.123456
      MYSQL_DATABASE: etps
    networks:
      - etps-net
    volumes:
      - /opt/etps/mysql/data:/var/lib/mysql
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "mysql -uroot -p$$MYSQL_ROOT_PASSWORD -e 'SELECT 1' >/dev/null 2>&1"
        ]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 60s
  etps:
    image: xiaoniucode/etps:0.10.0
    container_name: etps
    restart: unless-stopped
    ports:
      - "8080:8080" # HTTP 隧道代理服务
      - "8020:8020" # 管理面板
      - "9527:9527" # 控制隧道
      - "9050-9099:9050-9099" # TCP 隧道代理服务
    environment:
      JAVA_OPTS: "-Xms256m -Xmx256m -XX:MaxDirectMemorySize=512m -XX:+UseG1GC"
      MYSQL_PASSWORD: etps.123456
      MYSQL_HOST: etps-mysql
      TZ: Asia/Shanghai
    volumes:
      - /opt/etps/config:/app/config
      - /opt/etps/certs:/app/certs
      - /opt/etps/logs:/app/logs
    networks:
      - etps-net
    depends_on:
      etps-mysql:
        condition: service_healthy
networks:
  etps-net:
    driver: bridge