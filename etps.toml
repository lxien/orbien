server_addr = "0.0.0.0"
server_port = 9527
http_proxy_port = 80
https_proxy_port = 8443
root_domains = ["domain1.com", "domain2.com"]

# 访客入口 PROXY 协议（前置 HAProxy/云/Nginx LB 时开启）
[proxy_protocol]
enabled = true
strict = false
trusted_proxies = ["127.0.0.1/32"]


[transport]

[transport.tcp]
enabled = true
port = 9527

[transport.tcp.tls]
enabled = true
cert_file = "cert/transport/server.crt"
key_file = "cert/transport/server.key"
ca_file = "cert/transport/ca.crt"

[transport.websocket]
enabled = true
port = 9528
path = "/tunnel"

[transport.websocket.tls]
enabled = true
cert_file = "cert/transport/server.crt"
key_file = "cert/transport/server.key"
ca_file = "cert/transport/ca.crt"

[transport.quic]
enabled = true
port = 9529

[transport.quic.tls]
enabled = true
cert_file = "cert/transport/server.crt"
key_file = "cert/transport/server.key"
ca_file = "cert/transport/ca.crt"

[auth]
[[auth.tokens]]
name = "macos"
token = "414083A8563774142CAC91DDB5C9A2ED"

#管理界面
[dashboard]
enabled = true
addr = "localhost"
port = 8030
username = "admin"
password = "123456"
cert_file=""
key_file=""

[[port_pool.tcp]]
start = 9050
end = 9099

[[port_pool.tcp]]
single = 10000

[[port_pool.udp]]
start = 9050
end = 9099

