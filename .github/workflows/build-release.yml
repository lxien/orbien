name: Build release version

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

env:
  JAVA_VERSION: '25'
  NODE_VERSION: '24'

# 默认最小权限；需要写权限的 job 单独覆盖
permissions:
  contents: read
  actions: read

jobs:
  # =============================================
  # 阶段1：构建 Vue 前端
  # =============================================
  build-frontend:
    name: 构建前端资源
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: write
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Node.js 环境
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: 安装 pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: 获取 pnpm store 目录
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_OUTPUT
        id: pnpm-cache

      - name: 缓存 pnpm 依赖
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: 安装依赖
        working-directory: ./console-ui
        run: pnpm install --frozen-lockfile

      - name: 构建前端
        working-directory: ./console-ui
        env:
          VITE_APP_API_BASE_URL: /api
        run: pnpm build

      - name: 上传前端构建产物
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: console-ui/dist
          retention-days: 1

  # =============================================
  # 阶段2：构建跨平台 Native 镜像
  # =============================================
  build-native:
    name: 构建原生镜像 - ${{ matrix.display_name }}
    needs: [build-frontend]
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux 平台
          - os: ubuntu-24.04
            platform: linux
            arch: amd64
            artifact_suffix: linux_amd64
            client_native_profile: client-native-linux-amd64
            display_name: "Linux AMD64"
          - os: ubuntu-24.04-arm
            platform: linux
            arch: arm64
            artifact_suffix: linux_arm64
            client_native_profile: client-native-linux-arm64
            display_name: "Linux ARM64"
          # Windows 平台
          - os: windows-latest
            platform: windows
            arch: amd64
            artifact_suffix: windows_amd64
            client_native_profile: client-native-windows-amd64
            display_name: "Windows AMD64"
          # macOS 平台
          - os: macos-latest
            platform: darwin
            arch: amd64
            artifact_suffix: darwin_amd64
            client_native_profile: client-native-darwin-amd64
            display_name: "macOS AMD64"
          - os: macos-latest
            platform: darwin
            arch: arm64
            artifact_suffix: darwin_arm64
            client_native_profile: client-native-darwin-arm64
            display_name: "macOS ARM64"

    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
      actions: write

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 下载前端构建产物
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: ./console-ui/dist

      - name: 复制前端资源到 Spring Boot (Unix)
        if: matrix.platform != 'windows'
        run: |
          mkdir -p main/orbien-server-app/src/main/resources/static
          cp -r console-ui/dist/* main/orbien-server-app/src/main/resources/static/
          echo "✅ 前端资源已复制到 static 目录"
          ls -la main/orbien-server-app/src/main/resources/static/

      - name: 复制前端资源到 Spring Boot (Windows)
        if: matrix.platform == 'windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path main\orbien-server-app\src\main\resources\static
          Copy-Item -Recurse -Force console-ui\dist\* main\orbien-server-app\src\main\resources\static\
          Write-Host "✅ 前端资源已复制到 static 目录"

      - name: 设置 GraalVM 环境
        uses: graalvm/setup-graalvm@v1
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'graalvm'
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: 缓存 Maven 依赖
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ matrix.platform }}-${{ matrix.arch }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ matrix.platform }}-${{ matrix.arch }}-maven-

      - name: 安装根目录模块到本地仓库
        shell: bash
        run: mvn install -pl '!main' -am -DskipTests -D"gpg.skip=true" --no-transfer-progress

      - name: 构建服务端 JAR 包
        shell: bash
        run: cd main && mvn clean package -pl orbien-server-app -DskipTests --no-transfer-progress

      - name: 构建客户端原生镜像
        shell: bash
        run: mvn clean package -pl main/orbien-client-app,client -am -Pnative,${{ matrix.client_native_profile }} -DskipTests -D"gpg.skip=true" --no-transfer-progress

      # Linux/macOS 打包
      - name: 打包 Unix 发布文件
        if: matrix.platform != 'windows'
        shell: bash
        run: |
          VERSION="${{ github.ref_name }}"
          SERVER_RELEASE_NAME="orbien-server_${VERSION}_${{ matrix.artifact_suffix }}"
          CLIENT_RELEASE_NAME="orbien_${VERSION}_${{ matrix.artifact_suffix }}"

          mkdir -p "$SERVER_RELEASE_NAME/config"
          mkdir -p "$CLIENT_RELEASE_NAME"

          # 打包服务端
          cp main/orbien-server-app/target/orbien-server.jar "$SERVER_RELEASE_NAME/orbien-server.jar"
          cp "main/orbien-server-app/src/main/resources/orbien-server.toml" "$SERVER_RELEASE_NAME/orbien-server.toml"
          cp "main/orbien-server-app/src/main/resources/application.yml" "$SERVER_RELEASE_NAME/config/application.yml"
          cp "main/orbien-server-app/src/main/resources/application-h2.yml" "$SERVER_RELEASE_NAME/config/application-h2.yml"
          cp "main/orbien-server-app/src/main/resources/application-mysql.yml" "$SERVER_RELEASE_NAME/config/application-mysql.yml"
          cp "main/orbien-server-app/src/main/resources/logback-spring.xml" "$SERVER_RELEASE_NAME/config/logback-spring.xml"

          # 打包客户端
          cp "main/orbien-client-app/target/orbien" "$CLIENT_RELEASE_NAME/orbien"
          cp "main/orbien-client-app/src/main/resources/orbien.toml" "$CLIENT_RELEASE_NAME/orbien.toml"

          tar -czf "$SERVER_RELEASE_NAME.tar.gz" "$SERVER_RELEASE_NAME"
          tar -czf "$CLIENT_RELEASE_NAME.tar.gz" "$CLIENT_RELEASE_NAME"
          echo "✅ Unix打包完成: $SERVER_RELEASE_NAME.tar.gz, $CLIENT_RELEASE_NAME.tar.gz"

      # Windows 打包
      - name: 打包 Windows 发布文件
        if: matrix.platform == 'windows'
        shell: pwsh
        run: |
          $VERSION = "${{ github.ref_name }}"
          $SERVER_RELEASE_NAME = "orbien-server_${VERSION}_${{ matrix.artifact_suffix }}"
          $CLIENT_RELEASE_NAME = "orbien_${VERSION}_${{ matrix.artifact_suffix }}"

          New-Item -ItemType Directory -Force -Path "$SERVER_RELEASE_NAME\config"
          New-Item -ItemType Directory -Force -Path $CLIENT_RELEASE_NAME

          # 打包服务端
          Copy-Item "main\orbien-server-app\target\orbien-server.jar" "$SERVER_RELEASE_NAME\orbien-server.jar"
          Copy-Item "main\orbien-server-app\src\main\resources\orbien-server.toml" "$SERVER_RELEASE_NAME\orbien-server.toml"
          Copy-Item "main\orbien-server-app\src\main\resources\application.yml" "$SERVER_RELEASE_NAME\config\application.yml"
          Copy-Item "main\orbien-server-app\src\main\resources\application-h2.yml" "$SERVER_RELEASE_NAME\config\application-h2.yml"
          Copy-Item "main\orbien-server-app\src\main\resources\application-mysql.yml" "$SERVER_RELEASE_NAME\config\application-mysql.yml"
          Copy-Item "main\orbien-server-app\src\main\resources\logback-spring.xml" "$SERVER_RELEASE_NAME\config\logback-spring.xml"

          # 打包客户端
          Copy-Item "main\orbien-client-app\target\orbien.exe" "$CLIENT_RELEASE_NAME\orbien.exe"
          Copy-Item "main\orbien-client-app\src\main\resources\orbien.toml" "$CLIENT_RELEASE_NAME\orbien.toml"

          Compress-Archive -Path "$SERVER_RELEASE_NAME\*" -DestinationPath "$SERVER_RELEASE_NAME.zip"
          Compress-Archive -Path "$CLIENT_RELEASE_NAME\*" -DestinationPath "$CLIENT_RELEASE_NAME.zip"
          Write-Host "✅ Windows打包完成: $SERVER_RELEASE_NAME.zip, $CLIENT_RELEASE_NAME.zip"

      - name: 上传构件
        uses: actions/upload-artifact@v4
        with:
          name: orbien-server-${{ matrix.artifact_suffix }}-${{ github.ref_name }}
          path: orbien-server_${{ github.ref_name }}_${{ matrix.artifact_suffix }}.*

      - name: 上传构件
        uses: actions/upload-artifact@v4
        with:
          name: orbien-${{ matrix.artifact_suffix }}-${{ github.ref_name }}
          path: orbien_${{ github.ref_name }}_${{ matrix.artifact_suffix }}.*

  # =============================================
  # 阶段3：构建并推送 Docker 镜像
  # =============================================
  docker-build:
    name: 构建并推送 Docker 镜像
    needs: [build-native]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 下载 Docker 镜像构建所需的 orbien-server tar.gz
        uses: actions/download-artifact@v4
        with:
          name: orbien-server-linux_amd64-${{ github.ref_name }}
          path: ./

      - name: 下载客户端 Linux AMD64 构件
        uses: actions/download-artifact@v4
        with:
          name: orbien-linux_amd64-${{ github.ref_name }}
          path: ./

      - name: 下载客户端 Linux ARM64 构件
        uses: actions/download-artifact@v4
        with:
          name: orbien-linux_arm64-${{ github.ref_name }}
          path: ./

      - name: 准备服务端与客户端 Docker 构建上下文
        run: |
          set -euo pipefail
          test -f Dockerfile
          test -f Dockerfile.client

          mkdir -p main/orbien-server-app/target
          tar -xzf orbien-server_${{ github.ref_name }}_linux_amd64.tar.gz -C /tmp
          cp /tmp/orbien-server_${{ github.ref_name }}_linux_amd64/orbien-server.jar main/orbien-server-app/target/orbien-server.jar

          mkdir -p client-bin/amd64 client-bin/arm64
          tar -xzf orbien_${{ github.ref_name }}_linux_amd64.tar.gz -C /tmp
          tar -xzf orbien_${{ github.ref_name }}_linux_arm64.tar.gz -C /tmp
          cp /tmp/orbien_${{ github.ref_name }}_linux_amd64/orbien client-bin/amd64/orbien
          cp /tmp/orbien_${{ github.ref_name }}_linux_arm64/orbien client-bin/arm64/orbien
          chmod +x client-bin/amd64/orbien client-bin/arm64/orbien

          # 校验多架构二进制已就位，避免空镜像被推送
          test -x client-bin/amd64/orbien
          test -x client-bin/arm64/orbien
          file client-bin/amd64/orbien
          file client-bin/arm64/orbien
          ls -lh client-bin/amd64/orbien client-bin/arm64/orbien

      - name: 提取版本号
        id: version
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: 设置 QEMU（跨架构模拟）
        uses: docker/setup-qemu-action@v3

      - name: 设置 Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 登录到 Docker Hub
        env:
          DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
          DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}
        run: |
          set -euo pipefail
          USERNAME=$(printf '%s' "$DOCKER_USERNAME" | tr -d '\r\n')
          PASSWORD=$(printf '%s' "$DOCKER_PASSWORD" | tr -d '\r\n')
          echo "DOCKER_USERNAME length=${#USERNAME}"
          echo "DOCKER_PASSWORD length=${#PASSWORD}"
          if [ "${#USERNAME}" -eq 0 ] || [ "${#PASSWORD}" -eq 0 ]; then
            echo "::error::DOCKER_USERNAME or DOCKER_PASSWORD is empty"
            exit 1
          fi
          printf '%s' "$PASSWORD" | docker login -u "$USERNAME" --password-stdin

      - name: 构建并推送多平台服务端 Docker 镜像
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            lxien/orbien-server:latest
            lxien/orbien-server:${{ steps.version.outputs.version }}

      - name: 构建并推送多平台客户端 Docker 镜像
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.client
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            lxien/orbien:latest
            lxien/orbien:${{ steps.version.outputs.version }}

  # =============================================
  # 阶段4：统一发布阶段
  # =============================================
  create-release:
    name: 创建统一 Release
    needs: [build-native]
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: read

    steps:
      - name: 下载所有构件
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts
          pattern: 'orbien*'
          merge-multiple: true

      - name: 读取发布信息模板
        id: release-notes
        run: echo "content=$(cat .github/RELEASE_NOTES_TEMPLATE.md)" >> $GITHUB_OUTPUT

      - name: 创建 GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: artifacts/**/*
          generate_release_notes: true
          body: ${{ steps.release-notes.outputs.content }}