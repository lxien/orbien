name: Build release version

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

env:
  JAVA_VERSION: '25'
  NODE_VERSION: '24'

jobs:
  # =============================================
  # 阶段1：构建 Vue 前端
  # =============================================
  build-frontend:
    name: 构建前端资源
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Node.js 环境
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: 安装 pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: 获取 pnpm store 目录
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_OUTPUT
        id: pnpm-cache

      - name: 缓存 pnpm 依赖
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: 安装依赖
        working-directory: ./console-ui
        run: pnpm install --frozen-lockfile

      - name: 构建前端
        working-directory: ./console-ui
        env:
          VITE_APP_API_BASE_URL: /api
        run: pnpm build

      - name: 上传前端构建产物
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: console-ui/dist
          retention-days: 1

  # =============================================
  # 阶段2：构建跨平台 Native 镜像
  # =============================================
  build-native:
    name: 构建原生镜像 - ${{ matrix.display_name }}
    needs: [build-frontend]
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux 平台
          - os: ubuntu-latest
            platform: linux
            arch: amd64
            artifact_suffix: linux_amd64
            display_name: "Linux AMD64"
          - os: ubuntu-latest
            platform: linux
            arch: arm64
            artifact_suffix: linux_arm64
            display_name: "Linux ARM64"
          # Windows 平台
          - os: windows-latest
            platform: windows
            arch: amd64
            artifact_suffix: windows_amd64
            display_name: "Windows AMD64"
          - os: windows-latest
            platform: windows
            arch: arm64
            artifact_suffix: windows_arm64
            display_name: "Windows ARM64"
          # macOS 平台
          - os: macos-latest
            platform: darwin
            arch: amd64
            artifact_suffix: darwin_amd64
            display_name: "macOS AMD64"
          - os: macos-latest
            platform: darwin
            arch: arm64
            artifact_suffix: darwin_arm64
            display_name: "macOS ARM64"

    runs-on: ${{ matrix.os }}
    permissions:
      contents: write

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 下载前端构建产物
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: ./console-ui/dist

      - name: 复制前端资源到 Spring Boot (Unix)
        if: matrix.os != 'windows-latest'
        run: |
          mkdir -p main/etps/src/main/resources/static
          cp -r console-ui/dist/* main/etps/src/main/resources/static/
          echo "✅ 前端资源已复制到 static 目录"
          ls -la main/etps/src/main/resources/static/

      - name: 复制前端资源到 Spring Boot (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path main\etps\src\main\resources\static
          Copy-Item -Recurse -Force console-ui\dist\* main\etps\src\main\resources\static\
          Write-Host "✅ 前端资源已复制到 static 目录"

      - name: 设置 GraalVM 环境
        uses: graalvm/setup-graalvm@v1
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'graalvm'
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: 缓存 Maven 依赖
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ matrix.platform }}-${{ matrix.arch }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ matrix.platform }}-${{ matrix.arch }}-maven-

      - name: 安装根目录模块到本地仓库
        run: mvn install -pl '!main' -am -DskipTests -D"gpg.skip=true" --no-transfer-progress

      - name: 构建服务端 JAR 包
        run: cd main && mvn clean package -pl etps -DskipTests --no-transfer-progress

      - name: 构建客户端原生镜像
        run: cd main && mvn package native:compile -pl etpc -Pnative -DskipTests --no-transfer-progress

      # Linux/macOS 打包
      - name: 打包 Unix 发布文件
        if: matrix.os != 'windows-latest'
        shell: bash
        run: |
          VERSION="${{ github.ref_name }}"
          RELEASE_NAME="etp_${VERSION}_${{ matrix.artifact_suffix }}"

          echo "=== 调试信息 ==="
          echo "当前目录: $(pwd)"
          echo "VERSION: $VERSION"
          echo "RELEASE_NAME: $RELEASE_NAME"
          echo ""
          echo "=== 项目根目录文件 ==="
          ls -la
          echo ""
          echo "=== main/etps/target ==="
          ls -la main/etps/target
          echo ""
          echo "=== main/etps/src/main/resources ==="
          ls -la main/etps/src/main/resources
          echo ""
          echo "=== main/etpc/target ==="
          ls -la main/etpc/target
          echo ""
          echo "=== main/etpc/src/main/resources ==="
          ls -la main/etpc/src/main/resources
          echo ""
          echo "=== 开始打包 ==="

          mkdir -p "$RELEASE_NAME/server/config"
          mkdir -p "$RELEASE_NAME/client"

          cp main/etps/target/etps-[0-9]*.jar "$RELEASE_NAME/server/etps.jar"
          cp "main/etps/src/main/resources/application.yml" "$RELEASE_NAME/server/config/application.yml"
          cp "main/etps/src/main/resources/application-mysql.yml" "$RELEASE_NAME/server/config/application-mysql.yml"

          cp "main/etpc/target/etpc" "$RELEASE_NAME/client/etpc"

          tar -czf "$RELEASE_NAME.tar.gz" "$RELEASE_NAME"
          echo "✅ Unix打包完成: $RELEASE_NAME.tar.gz"

      # Windows 打包
      - name: 打包 Windows 发布文件
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          $VERSION = "${{ github.ref_name }}"
          $RELEASE_NAME = "etp_${VERSION}_${{ matrix.artifact_suffix }}"

          New-Item -ItemType Directory -Force -Path "$RELEASE_NAME\server\config"
          New-Item -ItemType Directory -Force -Path "$RELEASE_NAME\client"

          Copy-Item "main\etps\target\etps-[0-9]*.jar" "$RELEASE_NAME\server\etps.jar"
          Copy-Item "main\etps\src\main\resources\application.yml" "$RELEASE_NAME\server\config\application.yml"
          Copy-Item "main\etps\src\main\resources\application-mysql.yml" "$RELEASE_NAME\server\config\application-mysql.yml"

          Copy-Item "main\etpc\target\etpc.exe" "$RELEASE_NAME\client\etpc.exe"

          Compress-Archive -Path "$RELEASE_NAME\*" -DestinationPath "$RELEASE_NAME.zip"
          Write-Host "✅ Windows打包完成: $RELEASE_NAME.zip"

      - name: 上传构件
        uses: actions/upload-artifact@v4
        with:
          name: etp-${{ matrix.artifact_suffix }}-${{ github.ref_name }}
          path: etp_${{ github.ref_name }}_${{ matrix.artifact_suffix }}.*

  # =============================================
  # 阶段4：统一发布阶段
  # =============================================
  create-release:
    name: 创建统一 Release
    needs: [build-native]
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: 下载所有构件
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts
          pattern: '*'
          merge-multiple: true

      - name: 删除空文件
        run: find artifacts/ -type f -size 0 -delete

      - name: 创建 GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: artifacts/**/*
          generate_release_notes: true