name: Build release version

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

env:
  JAVA_VERSION: '25'
  NODE_VERSION: '24'

# 默认最小权限；需要写权限的 job 单独覆盖
permissions:
  contents: read
  actions: read

jobs:
  # =============================================
  # 阶段1：构建 Vue 前端
  # =============================================
  build-frontend:
    name: 构建前端资源
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: write
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Node.js 环境
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: 安装 pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: 获取 pnpm store 目录
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_OUTPUT
        id: pnpm-cache

      - name: 缓存 pnpm 依赖
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: 安装依赖
        working-directory: ./console-ui
        run: pnpm install --frozen-lockfile

      - name: 构建前端
        working-directory: ./console-ui
        env:
          VITE_APP_API_BASE_URL: /api
        run: pnpm build

      - name: 上传前端构建产物
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: console-ui/dist
          retention-days: 1

  # =============================================
  # 阶段2：构建跨平台 Native 镜像
  # =============================================
  build-native:
    name: 构建原生镜像 - ${{ matrix.display_name }}
    needs: [build-frontend]
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux 平台
          - os: ubuntu-24.04
            platform: linux
            arch: amd64
            artifact_suffix: linux_amd64
            client_native_profile: client-native-linux-amd64
            display_name: "Linux AMD64"
          - os: ubuntu-24.04-arm
            platform: linux
            arch: arm64
            artifact_suffix: linux_arm64
            client_native_profile: client-native-linux-arm64
            display_name: "Linux ARM64"
          # Windows 平台
          - os: windows-latest
            platform: windows
            arch: amd64
            artifact_suffix: windows_amd64
            client_native_profile: client-native-windows-amd64
            display_name: "Windows AMD64"
          # macOS 平台
          - os: macos-latest
            platform: darwin
            arch: amd64
            artifact_suffix: darwin_amd64
            client_native_profile: client-native-darwin-amd64
            display_name: "macOS AMD64"
          - os: macos-latest
            platform: darwin
            arch: arm64
            artifact_suffix: darwin_arm64
            client_native_profile: client-native-darwin-arm64
            display_name: "macOS ARM64"

    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
      actions: write

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 下载前端构建产物
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: ./console-ui/dist

      - name: 复制前端资源到 Spring Boot (Unix)
        if: matrix.platform != 'windows'
        run: |
          mkdir -p main/orbiens/src/main/resources/static
          cp -r console-ui/dist/* main/orbiens/src/main/resources/static/
          echo "✅ 前端资源已复制到 static 目录"
          ls -la main/orbiens/src/main/resources/static/

      - name: 复制前端资源到 Spring Boot (Windows)
        if: matrix.platform == 'windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path main\orbiens\src\main\resources\static
          Copy-Item -Recurse -Force console-ui\dist\* main\orbiens\src\main\resources\static\
          Write-Host "✅ 前端资源已复制到 static 目录"

      - name: 设置 GraalVM 环境
        uses: graalvm/setup-graalvm@v1
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'graalvm'
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: 缓存 Maven 依赖
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ matrix.platform }}-${{ matrix.arch }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ matrix.platform }}-${{ matrix.arch }}-maven-

      - name: 安装根目录模块到本地仓库
        shell: bash
        run: mvn install -pl '!main' -am -DskipTests -D"gpg.skip=true" --no-transfer-progress

      - name: 构建服务端 JAR 包
        shell: bash
        run: cd main && mvn clean package -pl orbiens -DskipTests --no-transfer-progress

      - name: 构建客户端原生镜像
        shell: bash
        run: mvn clean package -pl main/orbienc,client -am -Pnative,${{ matrix.client_native_profile }} -DskipTests -D"gpg.skip=true" --no-transfer-progress

      # Linux/macOS 打包
      - name: 打包 Unix 发布文件
        if: matrix.platform != 'windows'
        shell: bash
        run: |
          VERSION="${{ github.ref_name }}"
          ORBIENS_RELEASE_NAME="orbiens_${VERSION}_${{ matrix.artifact_suffix }}"
          ORBIENC_RELEASE_NAME="orbienc_${VERSION}_${{ matrix.artifact_suffix }}"

          mkdir -p "$ORBIENS_RELEASE_NAME/config"
          mkdir -p "$ORBIENC_RELEASE_NAME"

          # 打包服务端
          cp main/orbiens/target/orbiens-[0-9]*.jar "$ORBIENS_RELEASE_NAME/orbiens.jar"
          cp "main/orbiens/src/main/resources/orbiens.toml" "$ORBIENS_RELEASE_NAME/orbiens.toml"
          cp "main/orbiens/src/main/resources/application.yml" "$ORBIENS_RELEASE_NAME/config/application.yml"
          cp "main/orbiens/src/main/resources/application-mysql.yml" "$ORBIENS_RELEASE_NAME/config/application-mysql.yml"
          cp "main/orbiens/src/main/resources/logback-spring.xml" "$ORBIENS_RELEASE_NAME/config/logback-spring.xml"

          # 打包客户端
          cp "main/orbienc/target/orbienc" "$ORBIENC_RELEASE_NAME/orbienc"
          cp "main/orbienc/src/main/resources/orbienc.toml" "$ORBIENC_RELEASE_NAME/orbienc.toml"

          tar -czf "$ORBIENS_RELEASE_NAME.tar.gz" "$ORBIENS_RELEASE_NAME"
          tar -czf "$ORBIENC_RELEASE_NAME.tar.gz" "$ORBIENC_RELEASE_NAME"
          echo "✅ Unix打包完成: $ORBIENS_RELEASE_NAME.tar.gz, $ORBIENC_RELEASE_NAME.tar.gz"

      # Windows 打包
      - name: 打包 Windows 发布文件
        if: matrix.platform == 'windows'
        shell: pwsh
        run: |
          $VERSION = "${{ github.ref_name }}"
          $ORBIENS_RELEASE_NAME = "orbiens_${VERSION}_${{ matrix.artifact_suffix }}"
          $ORBIENC_RELEASE_NAME = "orbienc_${VERSION}_${{ matrix.artifact_suffix }}"

          New-Item -ItemType Directory -Force -Path "$ORBIENS_RELEASE_NAME\config"
          New-Item -ItemType Directory -Force -Path $ORBIENC_RELEASE_NAME

          # 打包服务端
          Copy-Item "main\orbiens\target\orbiens-[0-9]*.jar" "$ORBIENS_RELEASE_NAME\orbiens.jar"
          Copy-Item "main\orbiens\src\main\resources\orbiens.toml" "$ORBIENS_RELEASE_NAME\orbiens.toml"
          Copy-Item "main\orbiens\src\main\resources\application.yml" "$ORBIENS_RELEASE_NAME\config\application.yml"
          Copy-Item "main\orbiens\src\main\resources\application-mysql.yml" "$ORBIENS_RELEASE_NAME\config\application-mysql.yml"
          Copy-Item "main\orbiens\src\main\resources\logback-spring.xml" "$ORBIENS_RELEASE_NAME\config\logback-spring.xml"

          # 打包客户端
          Copy-Item "main\orbienc\target\orbienc.exe" "$ORBIENC_RELEASE_NAME\orbienc.exe"
          Copy-Item "main\orbienc\src\main\resources\orbienc.toml" "$ORBIENC_RELEASE_NAME\orbienc.toml"

          Compress-Archive -Path "$ORBIENS_RELEASE_NAME\*" -DestinationPath "$ORBIENS_RELEASE_NAME.zip"
          Compress-Archive -Path "$ORBIENC_RELEASE_NAME\*" -DestinationPath "$ORBIENC_RELEASE_NAME.zip"
          Write-Host "✅ Windows打包完成: $ORBIENS_RELEASE_NAME.zip, $ORBIENC_RELEASE_NAME.zip"

      - name: 上传构件
        uses: actions/upload-artifact@v4
        with:
          name: orbiens-${{ matrix.artifact_suffix }}-${{ github.ref_name }}
          path: orbiens_${{ github.ref_name }}_${{ matrix.artifact_suffix }}.*

      - name: 上传构件
        uses: actions/upload-artifact@v4
        with:
          name: orbienc-${{ matrix.artifact_suffix }}-${{ github.ref_name }}
          path: orbienc_${{ github.ref_name }}_${{ matrix.artifact_suffix }}.*

  # =============================================
  # 阶段3：构建并推送 Docker 镜像
  # =============================================
  docker-build:
    name: 构建并推送 Docker 镜像
    needs: [build-native]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 下载 Docker 镜像构建所需的 orbiens tar.gz
        uses: actions/download-artifact@v4
        with:
          name: orbiens-linux_amd64-${{ github.ref_name }}
          path: ./

      - name: 创建工作目录并解压 tar.gz
        run: |
          mkdir -p main/orbiens/target
          tar -xzf orbiens_${{ github.ref_name }}_linux_amd64.tar.gz -C /tmp
          cp /tmp/orbiens_${{ github.ref_name }}_linux_amd64/orbiens.jar main/orbiens/target/orbiens.jar

      - name: 提取版本号
        id: version
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: 构建 Docker 镜像
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          docker build -t lxien/orbiens:latest -t lxien/orbiens:$VERSION .

      - name: 登录到 Docker Hub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: 推送 Docker 镜像
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          docker push lxien/orbiens:$VERSION
          docker push lxien/orbiens:latest

  # =============================================
  # 阶段4：统一发布阶段
  # =============================================
  create-release:
    name: 创建统一 Release
    needs: [build-native, docker-build]
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: read

    steps:
      - name: 下载所有构件
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts
          pattern: 'orbien?-*'
          merge-multiple: true

      - name: 读取发布信息模板
        id: release-notes
        run: echo "content=$(cat .github/RELEASE_NOTES_TEMPLATE.md)" >> $GITHUB_OUTPUT

      - name: 创建 GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: artifacts/**/*
          generate_release_notes: true
          body: ${{ steps.release-notes.outputs.content }}
           